name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'deplot to'
        required: true
        default: 'STG'
        

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/nodejs-app

jobs:

  # ───────────────────────────────────────────────────────────────
  # JOB 1 — Unit Tests
  # ───────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package.json

      - name: Install dependencies
        working-directory: app
        run: npm install

      - name: Run Jest tests with coverage
        working-directory: app
        run: npm test

      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: app/coverage/

  # ───────────────────────────────────────────────────────────────
  # JOB 2 — Vulnerability Scan (runs after tests pass)
  # ───────────────────────────────────────────────────────────────
  vulnerability-scan:
    name: Vulnerability Scan (Trivy)
    runs-on: ubuntu-latest
    needs: test
    permissions:                    # ← ADD THESE 3 LINES HERE
      security-events: write
      contents: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image for scanning
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:scan-${{ github.sha }} .

      - name: Run Trivy scan on Docker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:scan-${{ github.sha }}
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      - name: Run Trivy scan — save SARIF report
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          image-ref: ${{ env.IMAGE_NAME }}:scan-${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # ───────────────────────────────────────────────────────────────
  # JOB 3 — Build, Push to DockerHub & Update Manifest Repo
  #         (only runs if test + scan both pass)
  # ───────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: [test, vulnerability-scan]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push to DockerHub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update image tag in manifest repo
        run: |
          git config --global user.email "ci-bot@github.com"
          git config --global user.name "CI Bot"

          # Clone the manifest repo
          git clone https://x-access-token:${{ secrets.MANIFEST_REPO_TOKEN }}@github.com/${{ github.repository_owner }}/CD-pipeline_for_nodeJS_PRJ3.git

          cd CD-pipeline_for_nodeJS_PRJ3


          # Replace image tag in deployment.yaml
          sed -i "s|image: .*/nodejs-app:.*|image: ${{ env.IMAGE_NAME }}:${{ github.sha }}|g" deployment.yaml

          git add deployment.yaml
          git commit -m "ci: update image tag to ${{ github.sha }} [skip ci]"
          git push

      - name: Print image info
        run: |
          echo "✅ Image pushed: ${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "✅ Manifest repo updated — ArgoCD will auto-sync shortly"
